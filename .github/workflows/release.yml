name: Release

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  build_files: |
    target/release/arcdps_buddy.dll
    target/release/arcdps_buddy.pdb
    target/release/nexus_buddy.dll
    target/release/nexus_buddy.pdb

jobs:
  release:
    name: Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - run: cargo build --release --workspace
      - uses: actions/upload-artifact@v7
        with:
          name: buddy
          path: ${{ env.build_files }}
      - uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.build_files }}
